<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniCraft - Web Oyunu</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="overlay">
    <div class="menu">
      <h1>⛏️ MiniCraft</h1>
      <p>Web üzerinde çalışan Minecraft tarzı voxel oyunu</p>
      <button id="start-btn">Oyuna Başla</button>
      <div class="controls">
        <h3>Kontroller</h3>
        <ul>
          <li><kbd>W A S D</kbd> — Hareket</li>
          <li><kbd>Space</kbd> — Zıpla</li>
          <li><kbd>Shift</kbd> — Koş</li>
          <li><kbd>Mouse</kbd> — Etrafa bak</li>
          <li><kbd>Sol Tık</kbd> — Blok kır</li>
          <li><kbd>Sağ Tık</kbd> — Blok koy</li>
          <li><kbd>1-6</kbd> — Blok seç</li>
          <li><kbd>Esc</kbd> — Menüye dön</li>
        </ul>
      </div>
    </div>
  </div>

  <div id="hud" class="hidden">
    <div id="crosshair">+</div>
    <div id="hotbar">
      <div class="slot active" data-block="1"><span class="block-preview grass"></span><span class="key">1</span></div>
      <div class="slot" data-block="2"><span class="block-preview dirt"></span><span class="key">2</span></div>
      <div class="slot" data-block="3"><span class="block-preview stone"></span><span class="key">3</span></div>
      <div class="slot" data-block="4"><span class="block-preview wood"></span><span class="key">4</span></div>
      <div class="slot" data-block="5"><span class="block-preview sand"></span><span class="key">5</span></div>
      <div class="slot" data-block="6"><span class="block-preview leaves"></span><span class="key">6</span></div>
    </div>
    <div id="info">Blok: Çimen</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/game.js"></script>
</body>
</html>
